spring.application.name=digital-banking
server.port=8085

spring.datasource.url=jdbc:h2:file:./data/banque-db;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true

# SpringDoc / Swagger — forcer OpenAPI 3.0 (Swagger UI ne supporte pas encore 3.1)
springdoc.api-docs.version=openapi_3_0

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT
jwt.secret-key=9faSDFJKjkasdf09823jksdf90sdjkfsdf09823jksdfasdfasdf

# ── Telegram Bot ─────────────────────────────────────────────────────────────
# Le bot est DÉSACTIVÉ par défaut (telegram.bot.enabled=false).
# Pour l'activer : exporter TELEGRAM_ENABLED=true + TOKEN + USERNAME
# avant de lancer le backend, OU ajouter telegram.bot.enabled=true ici.
telegram.bot.enabled=${TELEGRAM_ENABLED:false}
telegram.bot.token=${TELEGRAM_BOT_TOKEN:not-configured}
telegram.bot.username=${TELEGRAM_BOT_USERNAME:not-configured}

# ── Spring AI / OpenAI ────────────────────────────────────────────────────────
# La clé est lue depuis .env (variable OPENAI_API_KEY, commence par sk-proj-...)
# Ne jamais mettre la clé en dur dans ce fichier !
spring.ai.openai.api-key=${OPENAI_API_KEY:not-configured}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.embedding.options.model=text-embedding-3-small

