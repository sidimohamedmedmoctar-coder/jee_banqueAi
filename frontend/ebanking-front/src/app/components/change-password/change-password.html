<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm">

        <div class="card-header bg-dark text-white">
          <h5 class="mb-0">🔑 Changer le mot de passe</h5>
        </div>

        <div class="card-body">

          <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>
          <div *ngIf="errorMessage"   class="alert alert-danger">{{ errorMessage }}</div>

          <form [formGroup]="form" (ngSubmit)="handleSubmit()">

            <!-- Ancien mot de passe -->
            <div class="mb-3">
              <label class="form-label">Ancien mot de passe</label>
              <input type="password" formControlName="oldPassword" class="form-control"
                     [class.is-invalid]="form.get('oldPassword')?.invalid && form.get('oldPassword')?.touched"
                     placeholder="Votre mot de passe actuel">
              <div class="invalid-feedback">Champ requis.</div>
            </div>

            <!-- Nouveau mot de passe -->
            <div class="mb-3">
              <label class="form-label">Nouveau mot de passe</label>
              <input type="password" formControlName="newPassword" class="form-control"
                     [class.is-invalid]="np?.invalid && np?.touched"
                     placeholder="Min. 8 caractères, au moins 1 chiffre">
              <div class="invalid-feedback">
                <span *ngIf="np?.errors?.['required']">Champ requis.</span>
                <span *ngIf="np?.errors?.['minlength']">Minimum 8 caractères.</span>
                <span *ngIf="np?.errors?.['noDigit']">Doit contenir au moins un chiffre.</span>
              </div>
            </div>

            <!-- Confirmer le mot de passe -->
            <div class="mb-4">
              <label class="form-label">Confirmer le nouveau mot de passe</label>
              <input type="password" formControlName="confirmNewPassword" class="form-control"
                     [class.is-invalid]="(cp?.touched && form.errors?.['passwordMismatch'])"
                     placeholder="Répétez le nouveau mot de passe">
              <div class="invalid-feedback">Les mots de passe ne correspondent pas.</div>
            </div>

            <button type="submit" class="btn btn-dark w-100"
                    [disabled]="form.invalid || loading">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
              {{ loading ? 'Modification…' : 'Modifier le mot de passe' }}
            </button>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
