<!-- ── Bouton flottant ──────────────────────────────────────────────── -->
<button class="chat-fab" (click)="toggleWindow()" [class.active]="isOpen"
        title="Assistant bancaire IA">
  <span *ngIf="!isOpen">💬</span>
  <span *ngIf="isOpen">✕</span>
</button>

<!-- ── Fenêtre de chat ──────────────────────────────────────────────── -->
<div class="chat-window" *ngIf="isOpen">

  <!-- Header -->
  <div class="chat-header">
    <span>🤖 Assistant Bancaire IA</span>
    <button class="btn-close-chat" (click)="toggleWindow()">✕</button>
  </div>

  <!-- Messages -->
  <div class="chat-messages" #messagesContainer>
    <div *ngFor="let msg of messages"
         class="message-row"
         [class.user-row]="msg.sender === 'user'"
         [class.bot-row]="msg.sender === 'bot'">
      <div class="message-bubble"
           [class.user-bubble]="msg.sender === 'user'"
           [class.bot-bubble]="msg.sender === 'bot'">
        {{ msg.text }}
      </div>
    </div>

    <!-- Indicateur de chargement -->
    <div *ngIf="loading" class="message-row bot-row">
      <div class="message-bubble bot-bubble typing-indicator">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- Saisie -->
  <div class="chat-input-area">
    <textarea
      class="chat-input"
      rows="1"
      placeholder="Posez votre question…"
      [(ngModel)]="inputText"
      (keydown)="onKeyDown($event)"
      [disabled]="loading">
    </textarea>
    <button class="send-btn" (click)="sendMessage()"
            [disabled]="!inputText.trim() || loading">
      ➤
    </button>
  </div>

</div>
